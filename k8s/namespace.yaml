# Creates a dedicated Kubernetes namespace called "fapi".
# All resources for this stack (fapi-api, db-connector, mysql) live here.
# Namespaces provide isolation — RBAC, network policies, and resource quotas
# can all be scoped to this namespace without affecting other workloads.
apiVersion: v1          # Core Kubernetes API group
kind: Namespace         # Resource type
metadata:
  name: fapi            # Namespace name — referenced in every other manifest