quarkus.http.port=8080
quarkus.http.root-path=/api

quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c{2.}] [%X{requestId}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."org.tpkprav".level=DEBUG

jwt.issuer=tpk-fapi-api
jwt.expiration-minutes=15
# Base64-encoded HMAC key, must decode to >= 32 bytes. Override via JWT_SECRET env var in any non-dev environment.
jwt.secret=${JWT_SECRET:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=}

# MicroProfile REST Client — fapi-db-connector
quarkus.rest-client.db-connector.url=http://localhost:9090
quarkus.rest-client.db-connector.connect-timeout=2000
quarkus.rest-client.db-connector.read-timeout=5000
