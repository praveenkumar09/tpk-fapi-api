quarkus.http.port=8080
quarkus.http.root-path=/api

quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c{2.}] [%X{requestId}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."org.tpkprav".level=DEBUG

jwt.issuer=tpk-fapi-api
jwt.expiration-minutes=15
# Base64-encoded HMAC key, must decode to >= 32 bytes. Override via JWT_SECRET env var in any non-dev environment.
jwt.secret=${JWT_SECRET:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=}

# MicroProfile REST Client — fapi-db-connector
# Quarkus Stork registers services at BUILD TIME from these properties.
# The service name "db-connector" must appear here so the image knows about it.
# Each environment then overrides the discovery *values* at runtime via env vars.
quarkus.rest-client.db-connector.url=stork://db-connector
quarkus.rest-client.db-connector.connect-timeout=2000
quarkus.rest-client.db-connector.read-timeout=5000

# Stork — static-list is the safe default (works everywhere, no network calls at startup).
# Docker Compose and dev both use this; only K8s overrides to "kubernetes" type via env vars
# in fapi-api.yaml so Stork discovers live pod IPs for the failover test.
quarkus.stork.db-connector.service-discovery.type=static
# Default address points to localhost for dev; overridden per environment below.
quarkus.stork.db-connector.service-discovery.address-list=localhost:9090

# Local dev (./mvnw quarkus:dev) — Stork resolves to localhost:9090 via static-list above
%dev.quarkus.rest-client.db-connector.url=http://localhost:9090

# Docker Compose (QUARKUS_PROFILE=docker) — override address-list to Docker service name
%docker.quarkus.stork.db-connector.service-discovery.address-list=db-connector:9090
