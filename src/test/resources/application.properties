# Raise circuit-breaker threshold high enough that it never trips during the test suite.
# We test the fallback by mocking the service to throw, not by tripping the circuit.
org.tpkprav.controller.AuthController/token/CircuitBreaker/requestVolumeThreshold=500
org.tpkprav.controller.AuthController/token/CircuitBreaker/failureRatio=0.9
org.tpkprav.controller.AuthController/token/CircuitBreaker/delay=500
org.tpkprav.controller.AuthController/token/CircuitBreaker/successThreshold=1
# Reduce retry count so @InjectMock verify assertions are simpler to reason about
org.tpkprav.controller.AuthController/token/Retry/maxRetries=1
org.tpkprav.controller.AuthController/token/Retry/delay=10