quarkus.http.test-port=8081
quarkus.http.root-path=/api

# Karate logging
quarkus.log.console.enabled=true
quarkus.log.console.level=INFO
quarkus.log.category."com.intuit.karate".level=DEBUG

# ── AuthController fault-tolerance overrides ─────────────────────────────────
# Raise thresholds so the circuit never trips during the test suite.
# Fallback behaviour is tested by mocking the service to throw, not by tripping the circuit.
org.tpkprav.controller.AuthController/token/CircuitBreaker/requestVolumeThreshold=500
org.tpkprav.controller.AuthController/token/CircuitBreaker/failureRatio=0.9
org.tpkprav.controller.AuthController/token/CircuitBreaker/delay=500
org.tpkprav.controller.AuthController/token/CircuitBreaker/successThreshold=1
# Reduce retry count so @InjectMock verify assertions are simpler to reason about
org.tpkprav.controller.AuthController/token/Retry/maxRetries=1
org.tpkprav.controller.AuthController/token/Retry/delay=10

# ── DbConnectorClient fault-tolerance overrides ───────────────────────────────
# Prevent the db-connector client circuit from tripping across shared-JVM test classes.
# The client-level fallback (DbConnectorFallback) is verified by mocking store() to throw,
# not by tripping the circuit; cross-class state contamination would give false failures.
org.tpkprav.client.DbConnectorClient/store/CircuitBreaker/requestVolumeThreshold=500
org.tpkprav.client.DbConnectorClient/store/CircuitBreaker/failureRatio=0.9
org.tpkprav.client.DbConnectorClient/store/CircuitBreaker/delay=500
org.tpkprav.client.DbConnectorClient/store/CircuitBreaker/successThreshold=1
# 0 retries keeps the failure count down and makes mock-verify counts predictable
org.tpkprav.client.DbConnectorClient/store/Retry/maxRetries=0
org.tpkprav.client.DbConnectorClient/store/Retry/delay=10